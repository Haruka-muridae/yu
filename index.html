<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --bg2: #EFEDE8;
    --ink: #1A1A18;
    --ink2: #3D3D39;
    --ink3: #7A7A74;
    --rule: #D8D5CE;
    --accent: #2D3A2E;
    --accent-light: #4A5E4C;
    --white: #FAFAF8;
    --mono: 'DM Mono', monospace;
    --serif: 'Shippori Mincho', 'DM Serif Display', serif;
    --sans: 'Noto Sans JP', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(247,246,243,0.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--rule);

  .nav-logo {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--ink);
    text-decoration: none;

  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink3);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--ink); }

  section { padding: 100px 0; }
  .container { max-width: 900px; margin: 0 auto; padding: 0 40px; }
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 48px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .section-label::after {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--ink3);
  }

  #hero {
    min-height: 90vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding-top: 80px;
    padding-bottom: 80px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  .hero-grid {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 40px;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 60px;
    align-items: end;
  }
  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 24px;
  }
  .hero-headline {
    font-family: var(--serif);
    font-size: clamp(36px, 5vw, 56px);
    line-height: 1.35;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 28px;
  }
  .hero-sub {
    font-size: 15px;
    line-height: 1.85;
    color: var(--ink2);
    max-width: 520px;
    margin-bottom: 48px;
  }
  .hero-cta-group { display: flex; gap: 16px; flex-wrap: wrap; }
  .btn-primary {
    display: inline-block;
    padding: 14px 32px;
    background: var(--accent);
    color: var(--white);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: background 0.25s, transform 0.2s;
  }
  .btn-primary:hover { background: var(--accent-light); transform: translateY(-1px); }
  .btn-outline {
    display: inline-block;
    padding: 14px 32px;
    border: 1px solid var(--ink);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.05em;
    text-decoration: none;
    cursor: pointer;
    background: transparent;
    transition: background 0.25s, color 0.25s;
  }
  .btn-outline:hover { background: var(--ink); color: var(--white); }

  .photo-frame {
    width: 100%;
    aspect-ratio: 3/4;
    background: var(--bg2);
    border: 1px solid var(--rule);
    overflow: hidden;
    position: relative;
  }
  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .photo-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--ink3);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
  }
  .photo-placeholder-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid var(--rule);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #profile { background: var(--bg2); }
  .profile-inner {
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 80px;
    align-items: start;
  }
  .profile-name-block { position: sticky; top: 120px; }
  .profile-name {
    font-family: var(--serif);
    font-size: 48px;
    line-height: 1.2;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .profile-name-en {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--ink3);
    text-transform: uppercase;
  }
  .profile-divider {
    width: 32px;
    height: 1px;
    background: var(--accent);
    margin: 24px 0;
  }
  .profile-tags { display: flex; flex-direction: column; gap: 8px; }
  .profile-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ink3);
    text-transform: uppercase;
  }
  .profile-text { font-size: 15px; line-height: 2; color: var(--ink2); }
  .profile-text p { margin-bottom: 20px; }
  .profile-text p:last-child { margin-bottom: 0; }

  #activities { background: var(--bg); }
  .activities-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
    background: var(--rule);
  }
  .activity-card {
    background: var(--white);
    padding: 44px 40px;
    position: relative;
  }
  .activity-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink3);
    letter-spacing: 0.1em;
    margin-bottom: 24px;
    display: block;
  }
  .activity-title {
    font-family: var(--serif);
    font-size: 20px;
    color: var(--ink);
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .activity-desc {
    font-size: 13.5px;
    line-height: 1.9;
    color: var(--ink2);
  }

  #value { background: var(--accent); color: var(--white); }
  #value .section-label { color: rgba(255,255,255,0.4); }
  #value .section-label::after { background: rgba(255,255,255,0.3); }
  .value-headline {
    font-family: var(--serif);
    font-size: clamp(28px, 4vw, 44px);
    line-height: 1.45;
    color: var(--white);
    margin-bottom: 60px;
  }
  .value-list { display: flex; flex-direction: column; gap: 0; }
  .value-item {
    padding: 28px 0;
    border-top: 1px solid rgba(255,255,255,0.15);
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 40px;
    align-items: start;
  }
  .value-item:last-child { border-bottom: 1px solid rgba(255,255,255,0.15); }
  .value-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    padding-top: 3px;
  }
  .value-desc {
    font-size: 14.5px;
    line-height: 1.85;
    color: rgba(255,255,255,0.85);
  }

  #philosophy { background: var(--bg); }
  .philosophy-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }
  .philo-card { padding: 0; }
  .philo-num {
    font-family: var(--mono);
    font-size: 48px;
    font-weight: 300;
    color: var(--rule);
    line-height: 1;
    margin-bottom: 24px;

  .philo-title {
    font-family: var(--serif);
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .philo-text {

    line-height: 1.9;
    color: var(--ink3);
  }

  #services { background: var(--bg2); }
  .services-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 48px;
  }
  .services-note {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink3);
    text-transform: uppercase;
  }
  .services-list { display: flex; flex-direction: column; gap: 2px; }
  .service-row {
    background: var(--white);
    padding: 36px 40px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 40px;
    align-items: center;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .service-row:hover { background: var(--bg); }
  .service-title {
    font-family: var(--serif);
    font-size: 20px;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .service-desc {
    font-size: 13px;
    color: var(--ink3);
    line-height: 1.7;
  }
  .service-arrow {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--ink3);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .service-row:hover .service-arrow { transform: translateX(4px); }
  .services-coming {
    margin-top: 40px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink3);
    text-align: center;
    text-transform: uppercase;
  }

  .sns-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .sns-card {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px 28px 24px;
    background: var(--white);
    border: 1px solid var(--rule);
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    min-height: 160px;
  }
  .sns-card::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }
  .sns-card:hover {
    border-color: transparent;
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.07);
  }
  .sns-card:hover::before {
    transform: scaleX(1);
  }

  .sns-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .sns-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .sns-icon svg {
    width: 22px;
    height: 22px;
    fill: var(--ink3);
    transition: fill 0.2s;
  }
  .sns-card:hover .sns-icon svg {
    fill: var(--accent);

    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink3);
    background: var(--bg2);
    padding: 4px 8px;
    border-radius: 2px;

  .sns-card-title {
    font-family: var(--serif);
    font-size: 16px;
    color: var(--ink);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .sns-card-handle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink3);
    letter-spacing: 0.06em;
  }

  .sns-card-arrow {
    position: absolute;
    bottom: 20px;
    right: 24px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--rule);
    transition: color 0.2s, transform 0.2s;
  }
  .sns-card:hover .sns-card-arrow {

  .form-input, .form-textarea {

    border: 1px solid rgba(255,255,255,0.12);
    color: var(--white);
    padding: 14px 16px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 300;
    outline: none;

  .btn-white {
    display: inline-block;
    padding: 16px 36px;
    background: var(--white);
    color: var(--ink);

    font-size: 13px;
    font-weight: 500;

  .btn-white:hover { opacity: 0.85; transform: translateY(-1px); }

  .site-footer-wrap { background: #1A1A18; }
  .site-footer {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 40px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-name {
    font-family: var(--serif);
    font-size: 16px;
    color: rgba(255,255,255,0.5);
  }
  .footer-copy {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.25);

  @media (max-width: 768px) {
    nav { padding: 16px 24px; }
    .nav-links { display: none; }
    .hero-grid { grid-template-columns: 1fr; gap: 40px; padding: 0 24px; }
    .photo-frame { max-width: 200px; aspect-ratio: 1/1; border-radius: 50%; }
    .container { padding: 0 24px; }
    section { padding: 72px 0; }
    .profile-inner { grid-template-columns: 1fr; gap: 40px; }
    .profile-name-block { position: static; }
    .activities-grid { grid-template-columns: 1fr; }
    .value-item { grid-template-columns: 1fr; gap: 8px; }
    .philosophy-grid { grid-template-columns: 1fr; gap: 36px; }
    .contact-inner { grid-template-columns: 1fr; gap: 48px; }
    .services-header { flex-direction: column; gap: 8px; }
    .service-row { padding: 28px 24px; }
    .site-footer { padding: 24px; flex-direction: column; gap: 8px; text-align: center; }
    .sns-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  }
  @media (max-width: 480px) {
    .sns-grid { grid-template-columns: 1fr; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up   { animation: fadeUp 0.7s ease both; }
  .fade-up-2 { animation: fadeUp 0.7s 0.15s ease both; }
  .fade-up-3 { animation: fadeUp 0.7s 0.30s ease both; }
  .fade-up-4 { animation: fadeUp 0.7s 0.45s ease both; }
</style>
</head>

// 🔧 修正③: Honeypotによるスパム対策を追加
function Contact() {
  const [form, setForm] = useState({ name: "", email: "", message: "", _hp: "" });
  const [status, setStatus] = useState(null);

  const handleSubmit = async () => {
    // ボット判定: honeypotフィールドに値があれば送信しない
    if (form._hp) {
      setStatus("sent"); // ボットには成功に見せる（サイレント拒否）
      return;
    }

    // 入力バリデーション
    if (!form.name || !form.email || !form.message) {
      setStatus("error");
      return;
    }

    // メールアドレス形式チェック
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(form.email)) {
      setStatus("error");
      return;
    }

    // 文字数制限チェック
    if (form.name.length > 100 || form.message.length > 2000) {
      setStatus("error");
      return;
    }

    setStatus("sending");

    if (CONTACT_ENDPOINT) {
      try {
        await fetch(CONTACT_ENDPOINT, {
          method: "POST",
          mode:   "no-cors",
          headers: { "Content-Type": "application/json" },
          // honeypotフィールド(_hp)はサーバーに送らない
          body: JSON.stringify({ name: form.name, email: form.email, message: form.message }),
        });
        setStatus("sent");
        setForm({ name: "", email: "", message: "", _hp: "" });
      } catch {
        setStatus("error");
      }
    } else {
      setTimeout(() => {
        setStatus("sent");
        setForm({ name: "", email: "", message: "", _hp: "" });
      }, 800);
    }
  };

  return (
    <section id="contact">
      <div className="container">
        <div className="section-label">Contact</div>
        <div className="contact-inner">
          <div>
            <h2 className="contact-headline">
              まずは、<br/>相談から。
            </h2>
            <p className="contact-body">
              サービス内容のご質問、<br/>
              具体的なご相談、どちらも歓迎です。<br/><br/>
              正式な依頼でなくても構いません。<br/>
              「こういうことで困っている」という段階で<br/>
              ご連絡いただければ十分です。
            </p>
          </div>
          <div>
            {status === "sent" ? (
              <div style={{ padding: "40px 0", color: "rgba(255,255,255,0.7)", fontFamily: "var(--mono)", fontSize: 13, letterSpacing: "0.1em" }}>
                ✓ 送信が完了しました。<br/>
                <span style={{ fontSize: 11, opacity: 0.5 }}>数日以内にご連絡します。</span>
              </div>
            ) : (
              <div className="contact-form">
                {/* 🔧 修正③: Honeypotフィールド（ボット対策・人間には見えない） */}
                <div style={{ display: "none" }} aria-hidden="true">
                  <input
                    tabIndex="-1"
                    autoComplete="off"
                    value={form._hp}
                    onChange={e => setForm({ ...form, _hp: e.target.value })}
                  />
                </div>

                <div className="form-field">
                  <label className="form-label">お名前</label>
                  <input
                    className="form-input"
                    placeholder="山田 太郎"
                    value={form.name}
                    onChange={e => setForm({ ...form, name: e.target.value })}
                  />
                </div>
                <div className="form-field">
                  <label className="form-label">メールアドレス</label>
                  <input
                    className="form-input"
                    type="email"
                    placeholder="your@email.com"
                    value={form.email}
                    onChange={e => setForm({ ...form, email: e.target.value })}
                  />
                </div>
                <div className="form-field">
                  <label className="form-label">ご相談内容</label>
                  <textarea
                    className="form-textarea"
                    placeholder="現状や悩んでいることを、気軽に書いてください。"
                    value={form.message}
                    onChange={e => setForm({ ...form, message: e.target.value })}
                  />
                </div>
                {status === "error" && (
                  <p style={{ fontFamily: "var(--mono)", fontSize: 11, color: "#ff8888" }}>
                    入力内容を確認してください（メールアドレスの形式・必須項目をご確認ください）
                  </p>
                )}
                <button className="btn-white" onClick={handleSubmit} disabled={status === "sending"}>
                  {status === "sending" ? "送信中..." : "送信する"}
                </button>
              </div>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}
